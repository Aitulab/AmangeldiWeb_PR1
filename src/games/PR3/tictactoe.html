<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>⭕ Крестики-Нолики</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
}

.container {
    background: rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(16px);
    padding: 40px 35px;
    border-radius: 28px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-align: center;
    max-width: 460px;
    width: 95%;
}

h1 {
    font-size: 46px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #00ffea, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.score {
    display: flex;
    justify-content: center;
    gap: 35px;
    margin: 20px 0 30px 0;
    font-size: 19px;
}

.score div {
    background: rgba(0, 0, 0, 0.35);
    padding: 10px 24px;
    border-radius: 14px;
    min-width: 100px;
}

.status {
    font-size: 27px;
    font-weight: 600;
    min-height: 45px;
    margin-bottom: 20px;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 340px;
    margin: 0 auto;
}

.cell {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(255, 255, 255, 0.12);
    border: none;
    font-size: 58px;
    font-weight: bold;
    color: white;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
}

.cell:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.06);
}

.cell.x { color: #00ffea; text-shadow: 0 0 20px #00ffea; }
.cell.o { color: #ff00c8; text-shadow: 0 0 20px #ff00c8; }
.cell.taken { cursor: not-allowed; }

.win-line {
    animation: winAnim 1.4s ease forwards;
}

@keyframes winAnim {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); }
}

.controls {
    margin-top: 30px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    padding: 14px 26px;
    font-size: 16.5px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-reset { 
    background: linear-gradient(45deg, #f59e0b, #d97706); 
    color: white; 
}

.btn-mode { 
    background: linear-gradient(45deg, #8b5cf6, #ec4899); 
    color: white; 
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
}

.footer {
    margin-top: 25px;
    font-size: 14.5px;
    opacity: 0.75;
}
</style>
</head>
<body>

<div class="container">
    <h1>⭕ Крестики-Нолики</h1>
    
    <div class="score">
        <div>X: <span id="scoreX">0</span></div>
        <div>O: <span id="scoreO">0</span></div>
        <div>Ничьи: <span id="scoreDraw">0</span></div>
    </div>

    <div class="status" id="status">Ход игрока: <span style="color:#00ffea">X</span></div>

    <div class="board" id="board"></div>

    <div class="controls">
        <button class="btn-mode" onclick="toggleMode()">👤 vs 🤖 Компьютер</button>
        <button class="btn-reset" onclick="resetGame()">Начать заново</button>
    </div>

    <div class="footer">Режим: <span id="mode-text">Игрок против Игрока</span></div>
</div>

<script>
let currentPlayer = 'X';
let gameState = Array(9).fill("");
let gameActive = true;
let gameMode = 'pvp'; // pvp или pve
let scores = { X: 0, O: 0, Draw: 0 };

const statusEl = document.getElementById('status');
const boardEl = document.getElementById('board');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');
const scoreDrawEl = document.getElementById('scoreDraw');
const modeTextEl = document.getElementById('mode-text');

const winningConditions = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
];

function createBoard() {
    boardEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
        const cell = document.createElement('button');
        cell.classList.add('cell');
        cell.dataset.index = i;
        cell.addEventListener('click', handleCellClick);
        boardEl.appendChild(cell);
    }
}

function handleCellClick(e) {
    const index = parseInt(e.target.dataset.index);
    if (gameState[index] !== "" || !gameActive) return;
    if (gameMode === 'pve' && currentPlayer === 'O') return;

    makeMove(index);
}

function makeMove(index) {
    gameState[index] = currentPlayer;
    const cell = boardEl.children[index];
    cell.textContent = currentPlayer;
    cell.classList.add(currentPlayer.toLowerCase(), 'taken');

    if (checkWin()) {
        handleWin();
        return;
    }
    if (!gameState.includes("")) {
        handleDraw();
        return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusEl.innerHTML = `Ход игрока: <span style="color:${currentPlayer==='X'?'#00ffea':'#ff00c8'}">${currentPlayer}</span>`;

    if (gameMode === 'pve' && currentPlayer === 'O') {
        setTimeout(computerMove, 450);
    }
}

function checkWin() {
    for (let cond of winningConditions) {
        const [a, b, c] = cond;
        if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
            highlightWinningLine(cond);
            return true;
        }
    }
    return false;
}

function highlightWinningLine(condition) {
    condition.forEach(i => {
        boardEl.children[i].classList.add('win-line');
    });
}

function handleWin() {
    gameActive = false;
    scores[currentPlayer]++;
    updateScores();
    statusEl.innerHTML = `🎉 Победа <span style="color:${currentPlayer==='X'?'#00ffea':'#ff00c8'}">${currentPlayer}</span>!`;
}

function handleDraw() {
    gameActive = false;
    scores.Draw++;
    updateScores();
    statusEl.textContent = "🤝 Ничья!";
}

function updateScores() {
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDrawEl.textContent = scores.Draw;
}

function computerMove() {
    let available = gameState
        .map((val, i) => val === "" ? i : null)
        .filter(v => v !== null);

    if (available.length > 0) {
        const randomIndex = available[Math.floor(Math.random() * available.length)];
        makeMove(randomIndex);
    }
}

function toggleMode() {
    gameMode = gameMode === 'pvp' ? 'pve' : 'pvp';
    modeTextEl.textContent = gameMode === 'pvp' ? 
        "Игрок против Игрока" : 
        "Игрок против Компьютера";
    resetGame();
}

function resetGame() {
    currentPlayer = 'X';
    gameState = Array(9).fill("");
    gameActive = true;
    statusEl.innerHTML = `Ход игрока: <span style="color:#00ffea">X</span>`;
    createBoard();
}

// Запуск игры
createBoard();
</script>

</body>
</html>
